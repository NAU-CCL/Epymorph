# Tests that epymorph installs as a library without requiring users to build packages from source
# under a matrix of Python versions, operating systems, and dependency resolution strategies.
# 
# This is similar to matrix-test.yml, but avoids using the uv.lock file to mimic end users installing from PyPI.
# Aside from testing installation itself, we also run the unit test suite just to verify basic functionality.
#
# Note that we use a non-standard directory structure (under the default GHA working directory):
# - epymorph: source code is checked out here
# - project: we create a new uv project with a venv here and install epymorph as a dependency
#
# See scripts/install-test.sh for a similar test that runs locally (but requires bash).

name: Library installation matrix test

on: workflow_dispatch

permissions:
  id-token: write  # for aws-actions/configure-aws-credentials
  contents: read  # for actions/checkout

jobs:
  install-matrix:
    name: Install matrix
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-latest', 'macos-latest', 'windows-latest']
        python-version: ['3.11', '3.12']
        resolution: ['lowest', 'highest']

    runs-on: ${{ matrix.os }}

    env:
      # don't install packages newer than 7 days ago to mitigate supply chain attacks
      UV_EXCLUDE_NEWER: P7D
      
      # when using the 'lowest' resolution strategy, there are some lower-bound constraints to enforce
      # so that wheels are available for these libraries in all python versions
      CONSTRAINTS: |
        setuptools>=82
        pillow>=12
        pyproj>=3.7.2
        kiwisolver>=1.4.9
        fiona>=1.10

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: false
          version: ${{ vars.UV_VERSION }}
          python-version: ${{ matrix.python-version }}

      - name: Check out code
        uses: actions/checkout@v6
        with:
          path: epymorph

      - run: mkdir project

      - name: Setup project venv
        working-directory: project
        run: |
          uv init --bare --python ${{ matrix.python-version }}
          uv python pin ${{ matrix.python-version }}
          uv venv --managed-python

      - name: Setup cache folder (bash)
        if: runner.os != 'Windows'
        working-directory: project
        shell: bash
        run: |
          mkdir -p .cache
          echo "EPYMORPH_CACHE_PATH=$(realpath .cache)" >> $GITHUB_ENV

      - name: Setup cache folder (PowerShell)
        if: runner.os == 'Windows'
        working-directory: project
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .cache | Out-Null
          $cachePath = Resolve-Path .cache
          echo "EPYMORPH_CACHE_PATH=$cachePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ vars.AWS_OIDC_ROLE }}
          aws-region: us-west-2

      - name: Download cache files from S3
        working-directory: project
        run: |
          # sync just the geography summary files, which should be sufficient for fast tests
          aws s3 sync s3://epymorph-gha-cache .cache --exclude "*" --include "geography/us_tiger/*.tgz"

      - name: Create constraint file
        working-directory: project
        run: |
          # this is a cross-platform way to write the constraints file
          uv run python -c "import os; from pathlib import Path; Path('constraint.txt').write_text(os.environ['CONSTRAINTS'])"

      - name: Install dependencies
        working-directory: project
        run: |
          uv add ../epymorph --resolution ${{ matrix.resolution }} --constraint constraint.txt --no-build --no-binary-package epymorph
          uv add pytest vcrpy

      - name: Run tests
        working-directory: project
        run: |
          uv run pytest ../epymorph/tests/fast --vcr-mode=replay --quiet -W ignore::DeprecationWarning
